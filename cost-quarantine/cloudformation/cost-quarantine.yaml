AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Home cost quarantine deployed in the Organizations management account. Native
  AWS Budget actions attach one conservative containment SCP to Test when
  forecasted spend reaches its threshold and to Prod when actual spend reaches
  its threshold. Optional active remediation uses cross-region EventBridge
  forwarding and per-region Step Functions state machines (deployed via StackSet)
  with no Lambda functions.

Parameters:
  TestAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a 12-digit AWS account ID.
    Description: Test account monitored at the forecasted-spend threshold.

  ProdAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a 12-digit AWS account ID.
    Description: Prod account monitored at the actual-spend threshold.

  QuarantineRoleBoundaryArn:
    Type: String
    AllowedPattern: "^arn:aws:iam::[0-9]{12}:policy/home-cost-quarantine-role-boundary$"
    Description: Boundary ARN output by the permanent Identity Center stack.

  EnableRemediation:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Create the EventBridge forwarding rule for multi-region remediation. Keep false until the regional StackSet is deployed and approved.

  TestRemediationRoleName:
    Type: String
    Default: home-cost-quarantine-remediation
    AllowedPattern: "^[A-Za-z0-9+=,.@_-]{1,64}$"
    Description: Cross-account Test role assumed by the regional state machines.

  TestBudgetName:
    Type: String
    Default: home-cost-quarantine-test
    AllowedPattern: '^[^:\\]+$'
    MaxLength: 100

  ProdBudgetName:
    Type: String
    Default: home-cost-quarantine-prod
    AllowedPattern: '^[^:\\]+$'
    MaxLength: 100

  TestQuarantineThreshold:
    Type: Number
    Default: 50
    MinValue: 1
    Description: FORECASTED monthly Test-account spend in USD that triggers containment.

  ProdQuarantineThreshold:
    Type: Number
    Default: 50
    MinValue: 1
    Description: ACTUAL monthly Prod-account spend in USD that triggers containment.

  NotificationEmail:
    Type: String
    AllowedPattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    ConstraintDescription: Must be a valid email address.

  RemediationRegions:
    Type: CommaDelimitedList
    Default: us-east-1,us-west-2,eu-central-1,eu-north-1,ap-southeast-1
    Description: Regions where the regional remediation StackSet is deployed. Not referenced in this template; used by deploy.sh.

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W2001

Rules:
  DistinctWorkloadAccounts:
    Assertions:
      - Assert: !Not [!Equals [!Ref TestAccountId, !Ref ProdAccountId]]
        AssertDescription: Test and Prod account IDs must be different.

Conditions:
  EnableRemediationResources: !Equals [!Ref EnableRemediation, "true"]

Resources:
  QuarantineScp:
    Type: AWS::Organizations::Policy
    Properties:
      Name: home-cost-quarantine
      Type: SERVICE_CONTROL_POLICY
      Description: >
        Emergency Test/Prod containment. Denies selected new/start/invoke actions,
        but never stop/delete/terminate/remove/diagnostic actions or mitigation updates.
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNewOrStartedCompute
            Effect: Deny
            Resource: "*"
            Action:
              - ec2:RunInstances
              - ec2:StartInstances
              - ec2:CreateFleet
              - ec2:RequestSpotInstances
              - ec2:RequestSpotFleet
              - ec2:RunScheduledInstances
              - ec2:CreateNatGateway
              - elasticloadbalancing:CreateLoadBalancer
              - rds:CreateDBInstance
              - rds:CreateDBCluster
              - rds:RestoreDBInstanceFromDBSnapshot
              - rds:RestoreDBClusterFromSnapshot
              - rds:StartDBInstance
              - rds:StartDBCluster
              - ecs:RunTask
              - ecs:StartTask
              - ecs:CreateService
              - eks:CreateCluster
              - eks:CreateNodegroup
              - states:StartExecution
              - states:StartSyncExecution
              - apprunner:CreateService
              - apprunner:StartDeployment
              - apprunner:ResumeService
          - Sid: DenyMeteredAiAndJobs
            Effect: Deny
            Resource: "*"
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
              - bedrock:Converse
              - bedrock:ConverseStream
              - bedrock:StartAsyncInvoke
              - bedrock:CreateModelInvocationJob
              - bedrock-agentcore:InvokeAgentRuntime
              - bedrock-agentcore:InvokeAgentRuntimeForUser
              - bedrock-mantle:CreateInference
              - bedrock-mantle:CallWithBearerToken
              - aws-external-anthropic:*
              - athena:StartQueryExecution
              - transcribe:StartTranscriptionJob
              - transcribe:StartMedicalTranscriptionJob
              - translate:StartTextTranslationJob
              - mediaconvert:CreateJob
              - codebuild:StartBuild
              - codebuild:StartBuildBatch
              - imagebuilder:StartImagePipelineExecution

  BudgetActionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: home-cost-quarantine-budget-action
      PermissionsBoundary: !Ref QuarantineRoleBoundaryArn
      Description: Budget-only role for applying or manually reversing the containment SCP.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: budgets.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub arn:${AWS::Partition}:budgets::${AWS::AccountId}:*
      Policies:
        - PolicyName: manage-one-containment-scp
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - organizations:AttachPolicy
                  - organizations:DetachPolicy
                  - organizations:DescribePolicy
                  - organizations:ListPoliciesForTarget
                  - organizations:ListTargetsForPolicy
                Resource: "*"

  TestQuarantineBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Ref TestBudgetName
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref TestQuarantineThreshold
          Unit: USD
        CostFilters:
          LinkedAccount: [!Ref TestAccountId]

  ProdQuarantineBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Ref ProdBudgetName
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref ProdQuarantineThreshold
          Unit: USD
        CostFilters:
          LinkedAccount: [!Ref ProdAccountId]

  TestQuarantineAction:
    Type: AWS::Budgets::BudgetsAction
    DependsOn: TestQuarantineBudget
    Properties:
      BudgetName: !Ref TestBudgetName
      ActionType: APPLY_SCP_POLICY
      ApprovalModel: AUTOMATIC
      NotificationType: FORECASTED
      ActionThreshold:
        Type: ABSOLUTE_VALUE
        Value: !Ref TestQuarantineThreshold
      ExecutionRoleArn: !GetAtt BudgetActionRole.Arn
      Definition:
        ScpActionDefinition:
          PolicyId: !Ref QuarantineScp
          TargetIds: [!Ref TestAccountId]
      Subscribers:
        - Type: EMAIL
          Address: !Ref NotificationEmail

  ProdQuarantineAction:
    Type: AWS::Budgets::BudgetsAction
    DependsOn: ProdQuarantineBudget
    Properties:
      BudgetName: !Ref ProdBudgetName
      ActionType: APPLY_SCP_POLICY
      ApprovalModel: AUTOMATIC
      NotificationType: ACTUAL
      ActionThreshold:
        Type: ABSOLUTE_VALUE
        Value: !Ref ProdQuarantineThreshold
      ExecutionRoleArn: !GetAtt BudgetActionRole.Arn
      Definition:
        ScpActionDefinition:
          PolicyId: !Ref QuarantineScp
          TargetIds: [!Ref ProdAccountId]
      Subscribers:
        - Type: EMAIL
          Address: !Ref NotificationEmail

  # --- Conditional remediation resources (EnableRemediation=true) ---
  # When enabled, this rule forwards ExecuteBudgetAction CloudTrail events to
  # the default EventBridge bus in each remediation Region. Each Region has a
  # StackSet-deployed state machine that picks up the event and remediates
  # locally. The forwarding also covers us-east-1 itself.

  RegionalExecutionRole:
    Type: AWS::IAM::Role
    Condition: EnableRemediationResources
    Properties:
      RoleName: home-cost-quarantine-regional-states
      PermissionsBoundary: !Ref QuarantineRoleBoundaryArn
      Description: Global execution role for per-region remediation state machines.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub arn:${AWS::Partition}:states:*:${AWS::AccountId}:stateMachine:home-cost-quarantine-regional
      Policies:
        - PolicyName: assume-workload-remediation-role
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource:
                  - !Sub arn:${AWS::Partition}:iam::${TestAccountId}:role/${TestRemediationRoleName}
                  - !Sub arn:${AWS::Partition}:iam::${ProdAccountId}:role/${TestRemediationRoleName}
        - PolicyName: logging
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: "*"

  RegionalTriggerRole:
    Type: AWS::IAM::Role
    Condition: EnableRemediationResources
    Properties:
      RoleName: home-cost-quarantine-regional-trigger
      PermissionsBoundary: !Ref QuarantineRoleBoundaryArn
      Description: Allows EventBridge in any Region to start the regional remediation state machine.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: start-regional-state-machine
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: states:StartExecution
                Resource: !Sub arn:${AWS::Partition}:states:*:${AWS::AccountId}:stateMachine:home-cost-quarantine-regional

  EventForwardingRole:
    Type: AWS::IAM::Role
    Condition: EnableRemediationResources
    Properties:
      RoleName: home-cost-quarantine-event-forwarder
      PermissionsBoundary: !Ref QuarantineRoleBoundaryArn
      Description: Allows EventBridge to forward budget-action events to regional default buses.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: put-events-to-regional-buses
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource:
                  - !Sub arn:${AWS::Partition}:events:*:${AWS::AccountId}:event-bus/default

  EventForwardingRule:
    Type: AWS::Events::Rule
    Condition: EnableRemediationResources
    Properties:
      Name: home-cost-quarantine-forwarder
      Description: >
        Forwards ExecuteBudgetAction events for the Test quarantine budget to
        all remediation Regions. Regional state machines pick up the event
        locally and perform bounded stop/scale-to-zero.
      State: ENABLED
      EventPattern:
        source:
          - aws.budgets
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - budgets.amazonaws.com
          eventName:
            - ExecuteBudgetAction
          requestParameters:
            BudgetName:
              - !Ref TestBudgetName
              - !Ref ProdBudgetName
      Targets:
        - Id: forward-us-west-2
          Arn: !Sub arn:${AWS::Partition}:events:us-west-2:${AWS::AccountId}:event-bus/default
          RoleArn: !GetAtt EventForwardingRole.Arn
        - Id: forward-eu-central-1
          Arn: !Sub arn:${AWS::Partition}:events:eu-central-1:${AWS::AccountId}:event-bus/default
          RoleArn: !GetAtt EventForwardingRole.Arn
        - Id: forward-eu-north-1
          Arn: !Sub arn:${AWS::Partition}:events:eu-north-1:${AWS::AccountId}:event-bus/default
          RoleArn: !GetAtt EventForwardingRole.Arn
        - Id: forward-ap-southeast-1
          Arn: !Sub arn:${AWS::Partition}:events:ap-southeast-1:${AWS::AccountId}:event-bus/default
          RoleArn: !GetAtt EventForwardingRole.Arn

Outputs:
  QuarantineScpId:
    Description: Containment SCP controlled by both native Budget actions.
    Value: !Ref QuarantineScp
  TestQuarantineActionId:
    Description: Use with Budgets ExecuteAction REVERSE for manual Test release.
    Value: !Ref TestQuarantineAction
  ProdQuarantineActionId:
    Description: Use with Budgets ExecuteAction REVERSE for manual Prod release.
    Value: !Ref ProdQuarantineAction
  TestBudgetName:
    Value: !Ref TestBudgetName
  ProdBudgetName:
    Value: !Ref ProdBudgetName
  RemediationEnabled:
    Value: !Ref EnableRemediation
