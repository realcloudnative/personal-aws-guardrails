AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Workload-account side of the home cost-quarantine workflow. Deployed via
  service-managed StackSet to all workload OUs. Creates the narrowly scoped role
  assumed by the management-account regional Step Functions state machines via
  SDK integration Credentials. It permits enumeration, stop, and scale-to-zero
  for EC2, ASG, and ECS only. It does not permit delete, terminate, or remove
  operations.

Parameters:
  ManagementAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a 12-digit AWS account ID.

  TestRemediationRoleName:
    Type: String
    Default: paws-cost-quarantine-remediation
    AllowedPattern: "^[A-Za-z0-9+=,.@_-]{1,64}$"
    Description: Must match the management stack parameter of the same name.

Resources:
  TestRemediationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref TestRemediationRoleName
      Description: Reversible stop and scale-to-zero permissions for Test cost quarantine.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: TrustRegionalStateMachineExecutionRole
            Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${ManagementAccountId}:root
            Action: sts:AssumeRole
            Condition:
              ArnEquals:
                aws:PrincipalArn: !Sub arn:${AWS::Partition}:iam::${ManagementAccountId}:role/paws-cost-quarantine-regional-states
      Policies:
        - PolicyName: enumerate-and-reversibly-remediate
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EnumerateRunningResources
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - autoscaling:DescribeAutoScalingGroups
                  - ecs:ListClusters
                  - ecs:ListServices
                Resource: "*"
              - Sid: StopEc2
                Effect: Allow
                Action: ec2:StopInstances
                Resource: !Sub arn:${AWS::Partition}:ec2:*:${AWS::AccountId}:instance/*
              - Sid: ScaleAutoScalingGroupsToZero
                Effect: Allow
                Action: autoscaling:UpdateAutoScalingGroup
                Resource: !Sub arn:${AWS::Partition}:autoscaling:*:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/*
              - Sid: ScaleEcsServicesToZero
                Effect: Allow
                Action: ecs:UpdateService
                Resource: !Sub arn:${AWS::Partition}:ecs:*:${AWS::AccountId}:service/*
      Tags:
        - Key: home:workflow
          Value: cost-quarantine

Outputs:
  TestRemediationRoleArn:
    Value: !GetAtt TestRemediationRole.Arn
    Description: Pass this role name unchanged to the management stack and regional StackSet.
