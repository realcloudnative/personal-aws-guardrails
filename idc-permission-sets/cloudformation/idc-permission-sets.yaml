AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM Identity Center permission sets for separate management and workload
  users. ManagementReadOnly, LandingZoneAdmin, and IdentityCenterAdmin are
  assigned only to the management account and management user. BillingReadOnly
  gives the distinct workload user billing visibility in management; WorkloadAdmin
  is assigned only to Test and, when supplied, Prod. Deploy in the Organizations
  management account and Identity Center home Region through an SSO profile.

Parameters:
  IdentityCenterInstanceArn:
    Type: String
    AllowedPattern: "^arn:aws:sso:::instance/ssoins-[0-9A-Za-z-]+$"
    Description: IAM Identity Center instance ARN.

  ManagementAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a 12-digit AWS account ID.

  TestAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a 12-digit AWS account ID.

  ProdAccountId:
    Type: String
    Default: ""
    AllowedPattern: "^$|^[0-9]{12}$"
    ConstraintDescription: Leave empty or provide a 12-digit AWS account ID.

  ManagementPrincipalId:
    Type: String
    MinLength: 1
    Description: Identity Store user ID for the management principal.

  WorkloadPrincipalId:
    Type: String
    MinLength: 1
    Description: Identity Store user ID for the distinct workload principal.

  ManagementReadOnlySessionDuration:
    Type: String
    Default: PT4H
    AllowedPattern: "^PT([1-9]|1[0-2])H$"

  LandingZoneAdminSessionDuration:
    Type: String
    Default: PT2H
    AllowedPattern: "^PT([1-9]|1[0-2])H$"

  IdentityCenterAdminSessionDuration:
    Type: String
    Default: PT1H
    AllowedPattern: "^PT([1-9]|1[0-2])H$"

  BillingReadOnlySessionDuration:
    Type: String
    Default: PT4H
    AllowedPattern: "^PT([1-9]|1[0-2])H$"

  WorkloadAdminSessionDuration:
    Type: String
    Default: PT4H
    AllowedPattern: "^PT([1-9]|1[0-2])H$"


Rules:
  DistinctPrincipals:
    Assertions:
      - Assert: !Not [!Equals [!Ref ManagementPrincipalId, !Ref WorkloadPrincipalId]]
        AssertDescription: Management and workload principal IDs must be different.
  DistinctRequiredAccounts:
    Assertions:
      - Assert: !Not [!Equals [!Ref ManagementAccountId, !Ref TestAccountId]]
        AssertDescription: Management and Test account IDs must be different.
  DistinctOptionalProdAccount:
    RuleCondition: !Not [!Equals [!Ref ProdAccountId, ""]]
    Assertions:
      - Assert: !And
          - !Not [!Equals [!Ref ProdAccountId, !Ref ManagementAccountId]]
          - !Not [!Equals [!Ref ProdAccountId, !Ref TestAccountId]]
        AssertDescription: Prod must differ from the management and Test accounts.
Conditions:
  AssignProd: !Not [!Equals [!Ref ProdAccountId, ""]]

Resources:
  CostQuarantineRoleBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: home-cost-quarantine-role-boundary
      Description: Maximum permissions for the fixed management-account cost-quarantine roles.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: QuarantineOrchestrationCeiling
            Effect: Allow
            Action:
              - organizations:AttachPolicy
              - organizations:DetachPolicy
              - organizations:DescribePolicy
              - organizations:ListPoliciesForTarget
              - organizations:ListTargetsForPolicy
              - sts:AssumeRole
              - lambda:InvokeFunction
              - states:StartExecution
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:CreateLogDelivery
              - logs:GetLogDelivery
              - logs:UpdateLogDelivery
              - logs:DeleteLogDelivery
              - logs:ListLogDeliveries
              - logs:PutResourcePolicy
              - logs:DescribeResourcePolicies
              - logs:DescribeLogGroups
            Resource: "*"

  ManagementReadOnlyPermissionSet:
    Type: AWS::SSO::PermissionSet
    Properties:
      Name: ManagementReadOnly
      Description: Read-only inspection of the management account.
      InstanceArn: !Ref IdentityCenterInstanceArn
      SessionDuration: !Ref ManagementReadOnlySessionDuration
      ManagedPolicies:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

  LandingZoneAdminPermissionSet:
    Type: AWS::SSO::PermissionSet
    Properties:
      Name: LandingZoneAdmin
      Description: Landing-zone control plane with IAM lifecycle access limited to fixed, bounded quarantine roles.
      InstanceArn: !Ref IdentityCenterInstanceArn
      SessionDuration: !Ref LandingZoneAdminSessionDuration
      ManagedPolicies:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      InlinePolicy: !Sub |-
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "ManageOrganizationStructureAndPolicies",
              "Effect": "Allow",
              "Action": [
                "organizations:Describe*",
                "organizations:List*",
                "organizations:CreateOrganizationalUnit",
                "organizations:UpdateOrganizationalUnit",
                "organizations:DeleteOrganizationalUnit",
                "organizations:MoveAccount",
                "organizations:CreatePolicy",
                "organizations:UpdatePolicy",
                "organizations:DeletePolicy",
                "organizations:AttachPolicy",
                "organizations:DetachPolicy",
                "organizations:EnablePolicyType",
                "organizations:DisablePolicyType",
                "organizations:TagResource",
                "organizations:UntagResource"
              ],
              "Resource": "*"
            },
            {
              "Sid": "ManageBudgets",
              "Effect": "Allow",
              "Action": "budgets:*",
              "Resource": "*"
            },
            {
              "Sid": "ManageLandingZoneStacks",
              "Effect": "Allow",
              "Action": "cloudformation:*",
              "Resource": "*"
            },
            {
              "Sid": "ManageQuarantineMessaging",
              "Effect": "Allow",
              "Action": [
                "sns:CreateTopic", "sns:DeleteTopic", "sns:SetTopicAttributes",
                "sns:AddPermission", "sns:RemovePermission", "sns:Subscribe", "sns:Unsubscribe",
                "sns:TagResource", "sns:UntagResource"
              ],
              "Resource": [
                "arn:${AWS::Partition}:sns:*:${ManagementAccountId}:home-cost-quarantine-*",
                "arn:${AWS::Partition}:sns:*:${ManagementAccountId}:home-cost-quarantine-*:*"
              ]
            },
            {
              "Sid": "ManageQuarantineFunctions",
              "Effect": "Allow",
              "Action": [
                "lambda:CreateFunction", "lambda:DeleteFunction",
                "lambda:UpdateFunctionCode", "lambda:UpdateFunctionConfiguration",
                "lambda:AddPermission", "lambda:RemovePermission",
                "lambda:PutFunctionConcurrency", "lambda:DeleteFunctionConcurrency",
                "lambda:TagResource", "lambda:UntagResource"
              ],
              "Resource": "arn:${AWS::Partition}:lambda:*:${ManagementAccountId}:function:home-cost-quarantine-*"
            },
            {
              "Sid": "ManageQuarantineStateMachine",
              "Effect": "Allow",
              "Action": [
                "states:CreateStateMachine", "states:UpdateStateMachine", "states:DeleteStateMachine",
                "states:TagResource", "states:UntagResource"
              ],
              "Resource": "arn:${AWS::Partition}:states:*:${ManagementAccountId}:stateMachine:home-cost-quarantine-*"
            },
            {
              "Sid": "ManageQuarantineLogs",
              "Effect": "Allow",
              "Action": [
                "logs:CreateLogGroup", "logs:DeleteLogGroup", "logs:PutRetentionPolicy",
                "logs:DeleteRetentionPolicy", "logs:TagResource", "logs:UntagResource",
                "logs:TagLogGroup", "logs:UntagLogGroup"
              ],
              "Resource": [
                "arn:${AWS::Partition}:logs:*:${ManagementAccountId}:log-group:/aws/vendedlogs/states/home-cost-quarantine-*",
                "arn:${AWS::Partition}:logs:*:${ManagementAccountId}:log-group:/aws/vendedlogs/states/home-cost-quarantine-*:*"
              ]
            },
            {
              "Sid": "ApplyAccountBaselineSettings",
              "Effect": "Allow",
              "Action": [
                "ec2:EnableEbsEncryptionByDefault",
                "ec2:DisableEbsEncryptionByDefault",
                "ec2:ModifyEbsDefaultKmsKeyId",
                "ec2:ResetEbsDefaultKmsKeyId",
                "ec2:ModifyInstanceMetadataDefaults",
                "s3:PutAccountPublicAccessBlock",
                "guardduty:CreateDetector",
                "guardduty:UpdateDetector",
                "guardduty:DeleteDetector",
                "guardduty:TagResource",
                "guardduty:UntagResource"
              ],
              "Resource": "*"
            },
            {
              "Sid": "CreateOnlyBoundedQuarantineRoles",
              "Effect": "Allow",
              "Action": "iam:CreateRole",
              "Resource": [
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-budget-action",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-remediator",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-states",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-trigger"
              ],
              "Condition": {
                "StringEquals": {
                  "iam:PermissionsBoundary": "${CostQuarantineRoleBoundary}"
                }
              }
            },
            {
              "Sid": "ManageOnlyBoundedQuarantineRoles",
              "Effect": "Allow",
              "Action": [
                "iam:DeleteRole",
                "iam:GetRole",
                "iam:UpdateRole",
                "iam:UpdateAssumeRolePolicy",
                "iam:PutRolePolicy",
                "iam:DeleteRolePolicy",
                "iam:GetRolePolicy",
                "iam:ListRolePolicies",
                "iam:ListAttachedRolePolicies",
                "iam:TagRole",
                "iam:UntagRole"
              ],
              "Resource": [
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-budget-action",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-remediator",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-states",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-trigger"
              ]
            },
            {
              "Sid": "AttachApprovedBoundaryToQuarantineRoles",
              "Effect": "Allow",
              "Action": "iam:PutRolePermissionsBoundary",
              "Resource": [
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-budget-action",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-remediator",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-states",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-trigger"
              ],
              "Condition": {
                "StringEquals": {
                  "iam:PermissionsBoundary": "${CostQuarantineRoleBoundary}"
                }
              }
            },
            {
              "Sid": "RemoveBoundaryForQuarantineRoleDeletion",
              "Effect": "Allow",
              "Action": "iam:DeleteRolePermissionsBoundary",
              "Resource": [
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-budget-action",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-remediator",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-states",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-trigger"
              ]
            },
            {
              "Sid": "AttachOnlyLambdaBasicExecutionPolicy",
              "Effect": "Allow",
              "Action": ["iam:AttachRolePolicy", "iam:DetachRolePolicy"],
              "Resource": [
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-remediator",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-trigger"
              ],
              "Condition": {
                "ArnEquals": {
                  "iam:PolicyARN": "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
                }
              }
            },
            {
              "Sid": "PassOnlyBoundedQuarantineRoles",
              "Effect": "Allow",
              "Action": "iam:PassRole",
              "Resource": [
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-budget-action",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-remediator",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-states",
                "arn:${AWS::Partition}:iam::${ManagementAccountId}:role/home-cost-quarantine-trigger"
              ],
              "Condition": {
                "StringEquals": {
                  "iam:PassedToService": [
                    "budgets.amazonaws.com",
                    "lambda.amazonaws.com",
                    "states.amazonaws.com"
                  ]
                }
              }
            }
          ]
        }

  IdentityCenterAdminPermissionSet:
    Type: AWS::SSO::PermissionSet
    Properties:
      Name: IdentityCenterAdmin
      Description: Rare-use Identity Center administration plus lifecycle of this repository's identity stack.
      InstanceArn: !Ref IdentityCenterInstanceArn
      SessionDuration: !Ref IdentityCenterAdminSessionDuration
      ManagedPolicies:
        - arn:aws:iam::aws:policy/AWSSSOMasterAccountAdministrator
      InlinePolicy: !Sub |-
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "ManageThisIdentityCenterStack",
              "Effect": "Allow",
              "Action": "cloudformation:*",
              "Resource": "*"
            },
            {
              "Sid": "ManageQuarantineBoundaryLifecycle",
              "Effect": "Allow",
              "Action": [
                "iam:CreatePolicy",
                "iam:DeletePolicy",
                "iam:GetPolicy",
                "iam:GetPolicyVersion",
                "iam:ListPolicyVersions",
                "iam:ListEntitiesForPolicy",
                "iam:CreatePolicyVersion",
                "iam:DeletePolicyVersion",
                "iam:SetDefaultPolicyVersion",
                "iam:TagPolicy",
                "iam:UntagPolicy"
              ],
              "Resource": "${CostQuarantineRoleBoundary}"
            }
          ]
        }

  BillingReadOnlyPermissionSet:
    Type: AWS::SSO::PermissionSet
    Properties:
      Name: BillingReadOnly
      Description: Billing Console visibility for the workload user without billing changes.
      InstanceArn: !Ref IdentityCenterInstanceArn
      SessionDuration: !Ref BillingReadOnlySessionDuration
      ManagedPolicies:
        - arn:aws:iam::aws:policy/AWSBillingReadOnlyAccess

  WorkloadAdminPermissionSet:
    Type: AWS::SSO::PermissionSet
    Properties:
      Name: WorkloadAdmin
      Description: Administrator access for the separate workload user in assigned workload accounts.
      InstanceArn: !Ref IdentityCenterInstanceArn
      SessionDuration: !Ref WorkloadAdminSessionDuration
      ManagedPolicies:
        - arn:aws:iam::aws:policy/AdministratorAccess

  ManagementReadOnlyAssignment:
    Type: AWS::SSO::Assignment
    Properties:
      InstanceArn: !Ref IdentityCenterInstanceArn
      PermissionSetArn: !GetAtt ManagementReadOnlyPermissionSet.PermissionSetArn
      PrincipalId: !Ref ManagementPrincipalId
      PrincipalType: USER
      TargetId: !Ref ManagementAccountId
      TargetType: AWS_ACCOUNT

  LandingZoneAdminAssignment:
    Type: AWS::SSO::Assignment
    Properties:
      InstanceArn: !Ref IdentityCenterInstanceArn
      PermissionSetArn: !GetAtt LandingZoneAdminPermissionSet.PermissionSetArn
      PrincipalId: !Ref ManagementPrincipalId
      PrincipalType: USER
      TargetId: !Ref ManagementAccountId
      TargetType: AWS_ACCOUNT

  IdentityCenterAdminAssignment:
    Type: AWS::SSO::Assignment
    Properties:
      InstanceArn: !Ref IdentityCenterInstanceArn
      PermissionSetArn: !GetAtt IdentityCenterAdminPermissionSet.PermissionSetArn
      PrincipalId: !Ref ManagementPrincipalId
      PrincipalType: USER
      TargetId: !Ref ManagementAccountId
      TargetType: AWS_ACCOUNT

  BillingReadOnlyAssignment:
    Type: AWS::SSO::Assignment
    Properties:
      InstanceArn: !Ref IdentityCenterInstanceArn
      PermissionSetArn: !GetAtt BillingReadOnlyPermissionSet.PermissionSetArn
      PrincipalId: !Ref WorkloadPrincipalId
      PrincipalType: USER
      TargetId: !Ref ManagementAccountId
      TargetType: AWS_ACCOUNT

  TestWorkloadAdminAssignment:
    Type: AWS::SSO::Assignment
    Properties:
      InstanceArn: !Ref IdentityCenterInstanceArn
      PermissionSetArn: !GetAtt WorkloadAdminPermissionSet.PermissionSetArn
      PrincipalId: !Ref WorkloadPrincipalId
      PrincipalType: USER
      TargetId: !Ref TestAccountId
      TargetType: AWS_ACCOUNT

  ProdWorkloadAdminAssignment:
    Type: AWS::SSO::Assignment
    Condition: AssignProd
    Properties:
      InstanceArn: !Ref IdentityCenterInstanceArn
      PermissionSetArn: !GetAtt WorkloadAdminPermissionSet.PermissionSetArn
      PrincipalId: !Ref WorkloadPrincipalId
      PrincipalType: USER
      TargetId: !Ref ProdAccountId
      TargetType: AWS_ACCOUNT

Outputs:
  CostQuarantineRoleBoundaryArn:
    Description: Required permissions boundary for fixed management quarantine roles.
    Value: !Ref CostQuarantineRoleBoundary
  ManagementReadOnlyPermissionSetArn:
    Value: !GetAtt ManagementReadOnlyPermissionSet.PermissionSetArn
  LandingZoneAdminPermissionSetArn:
    Value: !GetAtt LandingZoneAdminPermissionSet.PermissionSetArn
  IdentityCenterAdminPermissionSetArn:
    Value: !GetAtt IdentityCenterAdminPermissionSet.PermissionSetArn
  BillingReadOnlyPermissionSetArn:
    Value: !GetAtt BillingReadOnlyPermissionSet.PermissionSetArn
  WorkloadAdminPermissionSetArn:
    Value: !GetAtt WorkloadAdminPermissionSet.PermissionSetArn
  ProdAssignmentEnabled:
    Value: !If [AssignProd, "true", "false"]
