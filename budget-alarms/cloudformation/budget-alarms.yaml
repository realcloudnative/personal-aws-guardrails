AWSTemplateFormatVersion: "2010-09-09"
Description: >
  One managed home Safety Net budget in the Organizations management account.
  It monitors consolidated organization spend and sends simple percentage-based
  email alerts without per-account micro-budgets.

Parameters:
  NotificationEmail:
    Type: String
    Description: Email address that receives budget alerts.
    AllowedPattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    ConstraintDescription: Must be a valid email address.

  OverallMonthlyLimit:
    Type: Number
    Default: 20
    MinValue: 1
    Description: Monthly USD budget for consolidated organization spend.

Resources:
  OverallBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: paws-overall-monthly
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref OverallMonthlyLimit
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 25
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 50
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 75
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 50
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail

Outputs:
  OverallBudgetName:
    Description: Name of the managed organization-wide monthly budget.
    Value: !Ref OverallBudget
  OverallMonthlyLimit:
    Description: Configured monthly limit in USD.
    Value: !Ref OverallMonthlyLimit
