AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Regional specialization SCP: restricts what can happen in each allowed region
  based on its intended purpose. Also protects S3 Object Lock governance mode.
  Deploy from the management account, attach to both OUs.

Parameters:
  PolicyNamePrefix:
    Type: String
    Default: paws
    AllowedPattern: "^[A-Za-z0-9_-]{1,40}$"

  TargetIds:
    Type: String
    Default: NONE
    AllowedPattern: "^(NONE|ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}(,ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})*)$"
    Description: Comma-separated OU IDs, or NONE to leave detached.

Conditions:
  Attach: !Not [!Equals [!Ref TargetIds, NONE]]

Resources:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. US-EAST-1: Global-service necessities only.
  # CloudFront requires ACM certs in us-east-1. Route 53, IAM, Organizations,
  # Budgets etc. are global (handled by the region lock NotAction). Here we
  # restrict what regional services can do in us-east-1.
  # ─────────────────────────────────────────────────────────────────────────
  UsEast1NecessitiesOnly:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-region-useast1-globals-only
      Type: SERVICE_CONTROL_POLICY
      Description: >
        US-East-1 restricted to global-service necessities: ACM for
        CloudFront, CloudFront distributions, WAF for CloudFront,
        and S3 (CloudFront origin). No compute, no databases, no general use.
      TargetIds: !If
        - Attach
        - !Split [",", !Ref TargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: personal-aws-guardrails
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: UsEast1AllowOnlyGlobalNecessities
            Effect: Deny
            NotAction:
              # ACM: public certs for CloudFront
              - acm:*
              # CloudFront control-plane calls land in us-east-1
              - cloudfront:*
              # WAF v2 for CloudFront (scope=CLOUDFRONT requires us-east-1)
              - wafv2:*
              # S3: CloudFront origins, state buckets, log delivery
              - s3:*
              # Shield Advanced (CloudFront protection)
              - shield:*
              # SNS: CloudFront and ACM notifications
              - sns:*
              # CloudWatch: metrics for CloudFront/WAF
              - cloudwatch:Get*
              - cloudwatch:List*
              - cloudwatch:Describe*
              # Logs: WAF logging
              - logs:*
              # KMS: decrypt objects for CloudFront origins
              - kms:Decrypt
              - kms:DescribeKey
              - kms:GenerateDataKey*
              - kms:ListKeys
              - kms:ListAliases
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: us-east-1

  # ─────────────────────────────────────────────────────────────────────────
  # 2. AP-SOUTHEAST-1 (Singapore): Departing region, cleanup only.
  # Allow list/describe/get/delete. Deny create/put/start/invoke/run.
  # ─────────────────────────────────────────────────────────────────────────
  ApSoutheast1Cleanup:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-region-apse1-cleanup-only
      Type: SERVICE_CONTROL_POLICY
      Description: >
        Singapore (ap-southeast-1): departing region. Only read and delete
        operations allowed. No new resources, no invocations, no writes.
      TargetIds: !If
        - Attach
        - !Split [",", !Ref TargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: personal-aws-guardrails
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: ApSe1DenyAllMutationsExceptDelete
            Effect: Deny
            NotAction:
              # Read operations (list, describe, get)
              - "ec2:Describe*"
              - "ec2:Get*"
              - "s3:Get*"
              - "s3:List*"
              - "lambda:List*"
              - "lambda:Get*"
              - "ecs:List*"
              - "ecs:Describe*"
              - "logs:Describe*"
              - "logs:Get*"
              - "logs:FilterLogEvents"
              - "cloudwatch:Get*"
              - "cloudwatch:List*"
              - "cloudwatch:Describe*"
              - "cloudformation:Describe*"
              - "cloudformation:List*"
              - "cloudformation:Get*"
              - "tag:Get*"
              - "resource-groups:List*"
              # Delete/terminate/remove operations
              - "ec2:TerminateInstances"
              - "ec2:DeleteSecurityGroup"
              - "ec2:DeleteSubnet"
              - "ec2:DeleteVpc"
              - "ec2:DeleteKeyPair"
              - "ec2:ReleaseAddress"
              - "ec2:DeleteSnapshot"
              - "ec2:DeregisterImage"
              - "ec2:DeleteVolume"
              - "ec2:DeleteNatGateway"
              - "ec2:DeleteInternetGateway"
              - "ec2:DetachInternetGateway"
              - "ec2:DeleteRouteTable"
              - "ec2:DeleteRoute"
              - "ec2:DisassociateRouteTable"
              - "ec2:DeleteNetworkInterface"
              - "s3:DeleteObject"
              - "s3:DeleteBucket"
              - "s3:DeleteBucketPolicy"
              - "lambda:DeleteFunction"
              - "lambda:DeleteEventSourceMapping"
              - "ecs:DeleteCluster"
              - "ecs:DeleteService"
              - "ecs:DeregisterTaskDefinition"
              - "logs:DeleteLogGroup"
              - "cloudformation:DeleteStack"
              - "cloudformation:SignalResource"
              # Stop (before delete)
              - "ec2:StopInstances"
              - "ecs:UpdateService"
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: ap-southeast-1

  # ─────────────────────────────────────────────────────────────────────────
  # 3. US-WEST-2: Bedrock innovation only.
  # Only Bedrock runtime + model management. Nothing else.
  # ─────────────────────────────────────────────────────────────────────────
  UsWest2BedrockOnly:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-region-uswest2-bedrock-only
      Type: SERVICE_CONTROL_POLICY
      Description: >
        US-West-2 restricted to Bedrock and Mantle only (model availability).
        No compute, storage, or other services.
      TargetIds: !If
        - Attach
        - !Split [",", !Ref TargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: personal-aws-guardrails
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: UsWest2BedrockAndMantleOnly
            Effect: Deny
            NotAction:
              - bedrock:*
              - bedrock-mantle:*
              - bedrock-agentcore:*
              # S3 needed to read/write Bedrock artifacts (images, documents)
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: us-west-2

  # ─────────────────────────────────────────────────────────────────────────
  # 4. EU-NORTH-1 (Stockholm): S3 backup + Bedrock.
  # Cross-region replication target and Bedrock access.
  # ─────────────────────────────────────────────────────────────────────────
  EuNorth1BackupAndBedrock:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-region-eunorth1-backup-bedrock
      Type: SERVICE_CONTROL_POLICY
      Description: >
        EU-North-1 restricted to S3 (cross-region replication target)
        and Bedrock/Mantle. No compute or other services.
      TargetIds: !If
        - Attach
        - !Split [",", !Ref TargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: personal-aws-guardrails
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: EuNorth1S3AndBedrockOnly
            Effect: Deny
            NotAction:
              # S3: cross-region replication target + general backup
              - s3:*
              # KMS: encrypt/decrypt replicated objects
              - kms:Decrypt
              - kms:DescribeKey
              - kms:Encrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
              - kms:ListKeys
              - kms:ListAliases
              - kms:CreateGrant
              # Bedrock: model access (available in eu-north-1)
              - bedrock:*
              - bedrock-mantle:*
              - bedrock-agentcore:*
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: eu-north-1

  # ─────────────────────────────────────────────────────────────────────────
  # 5. S3 Object Lock: deny bypass of governance retention.
  # Makes governance-mode locks unbreakable from member accounts.
  # Governance mode = deletions blocked but can be overridden with
  # BypassGovernanceRetention. This SCP removes that override ability,
  # giving you compliance-mode protection without the irreversibility.
  # ─────────────────────────────────────────────────────────────────────────
  ObjectLockProtection:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-s3-object-lock-protect
      Type: SERVICE_CONTROL_POLICY
      Description: >
        Deny s3:BypassGovernanceRetention so governance-mode Object Lock
        cannot be overridden from member accounts. Effectively makes
        governance mode as strong as compliance mode within this org.
      TargetIds: !If
        - Attach
        - !Split [",", !Ref TargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: personal-aws-guardrails
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyBypassGovernanceRetention
            Effect: Deny
            Action: s3:BypassGovernanceRetention
            Resource: "*"

Outputs:
  UsEast1PolicyId:
    Value: !Ref UsEast1NecessitiesOnly
  ApSoutheast1PolicyId:
    Value: !Ref ApSoutheast1Cleanup
  UsWest2PolicyId:
    Value: !Ref UsWest2BedrockOnly
  EuNorth1PolicyId:
    Value: !Ref EuNorth1BackupAndBedrock
  ObjectLockPolicyId:
    Value: !Ref ObjectLockProtection
