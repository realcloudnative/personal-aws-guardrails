AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Deny-Unless Service Control Policies for separate Prod and Test OUs. Every
  policy is created detached unless its own target parameter is explicitly set.
  Deploy from the AWS Organizations management account.

Parameters:
  PolicyNamePrefix:
    Type: String
    Default: home-guardrail
    AllowedPattern: "^[A-Za-z0-9_-]{1,40}$"
    Description: Generic policy-name prefix. Use a different prefix for a staged migration from legacy policies.

  ProdAllowedRegions:
    Type: CommaDelimitedList
    Default: us-east-1,us-west-2,eu-central-1,eu-north-1,ap-southeast-1
    Description: Regions allowed by the Prod region-lock policy.

  TestAllowedRegions:
    Type: CommaDelimitedList
    Default: us-east-1,us-west-2,eu-central-1,eu-north-1,ap-southeast-1
    Description: Regions allowed by the Test region-lock policy.

  ProdRegionLockTargetIds:
    Type: String
    Default: NONE
    AllowedPattern: "^(NONE|ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}(,ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})*)$"
    Description: Comma-separated OU IDs, or NONE to leave the Prod region lock detached.

  TestRegionLockTargetIds:
    Type: String
    Default: NONE
    AllowedPattern: "^(NONE|ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}(,ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})*)$"
    Description: Comma-separated OU IDs, or NONE to leave the Test region lock detached.

  ServiceAllowlistTargetIds:
    Type: String
    Default: NONE
    AllowedPattern: "^(NONE|ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}(,ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})*)$"
    Description: Comma-separated OU IDs, or NONE to leave the service allowlist detached.

  Ec2InstanceSizeTargetIds:
    Type: String
    Default: NONE
    AllowedPattern: "^(NONE|ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}(,ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})*)$"
    Description: Comma-separated OU IDs, or NONE to leave the EC2 size control detached.

  BaselineSecurityTargetIds:
    Type: String
    Default: NONE
    AllowedPattern: "^(NONE|ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}(,ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})*)$"
    Description: Comma-separated OU IDs, or NONE to leave common baseline security detached.

  CostControlTargetIds:
    Type: String
    Default: NONE
    AllowedPattern: "^(NONE|ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}(,ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})*)$"
    Description: Comma-separated OU IDs, or NONE to leave cost controls detached.

Conditions:
  AttachProdRegionLock: !Not [!Equals [!Ref ProdRegionLockTargetIds, NONE]]
  AttachTestRegionLock: !Not [!Equals [!Ref TestRegionLockTargetIds, NONE]]
  AttachServiceAllowlist: !Not [!Equals [!Ref ServiceAllowlistTargetIds, NONE]]
  AttachEc2InstanceSize: !Not [!Equals [!Ref Ec2InstanceSizeTargetIds, NONE]]
  AttachBaselineSecurity: !Not [!Equals [!Ref BaselineSecurityTargetIds, NONE]]
  AttachCostControl: !Not [!Equals [!Ref CostControlTargetIds, NONE]]

Resources:
  ProdRegionLockPolicy:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-prod-region-lock
      Type: SERVICE_CONTROL_POLICY
      Description: Deny regional actions outside the Prod allowed-region list; exempt global services.
      TargetIds: !If
        - AttachProdRegionLock
        - !Split [",", !Ref ProdRegionLockTargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: cloud-mgmt
        - Key: component
          Value: scp-guardrails
        - Key: managed-by
          Value: cloudformation
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyOutsideProdAllowedRegions
            Effect: Deny
            NotAction:
              - account:*
              - artifact:*
              - aws-external-anthropic:*
              - aws-portal:*
              - billing:*
              - budgets:*
              - ce:*
              - consolidatedbilling:*
              - cur:*
              - freetier:*
              - invoicing:*
              - payments:*
              - tax:*
              - bcm-data-exports:*
              - cost-optimization-hub:*
              - purchase-orders:*
              - cloudfront:*
              - cloudfront-keyvaluestore:*
              - health:*
              - iam:*
              - organizations:*
              - route53:*
              - route53domains:*
              - sts:*
              - support:*
              - supportplans:*
              - trustedadvisor:*
            Resource: "*"
            Condition:
              StringNotEquals:
                aws:RequestedRegion: !Ref ProdAllowedRegions

  TestRegionLockPolicy:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-test-region-lock
      Type: SERVICE_CONTROL_POLICY
      Description: Deny regional actions outside the Test allowed-region list; exempt global services.
      TargetIds: !If
        - AttachTestRegionLock
        - !Split [",", !Ref TestRegionLockTargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: cloud-mgmt
        - Key: component
          Value: scp-guardrails
        - Key: managed-by
          Value: cloudformation
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyOutsideTestAllowedRegions
            Effect: Deny
            NotAction:
              - account:*
              - artifact:*
              - aws-external-anthropic:*
              - aws-portal:*
              - billing:*
              - budgets:*
              - ce:*
              - consolidatedbilling:*
              - cur:*
              - freetier:*
              - invoicing:*
              - payments:*
              - tax:*
              - bcm-data-exports:*
              - cost-optimization-hub:*
              - purchase-orders:*
              - cloudfront:*
              - cloudfront-keyvaluestore:*
              - health:*
              - iam:*
              - organizations:*
              - route53:*
              - route53domains:*
              - sts:*
              - support:*
              - supportplans:*
              - trustedadvisor:*
            Resource: "*"
            Condition:
              StringNotEquals:
                aws:RequestedRegion: !Ref TestAllowedRegions

  ServiceAllowlistPolicy:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-service-allowlist
      Type: SERVICE_CONTROL_POLICY
      Description: Deny service actions outside the home-workload allowlist.
      TargetIds: !If
        - AttachServiceAllowlist
        - !Split [",", !Ref ServiceAllowlistTargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: cloud-mgmt
        - Key: component
          Value: scp-guardrails
        - Key: managed-by
          Value: cloudformation
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyServicesNotInAllowlist
            Effect: Deny
            NotAction:
              - bedrock:*
              - bedrock-agentcore:*
              - bedrock-mantle:*
              - aws-external-anthropic:*
              - aws-marketplace:Subscribe
              - aws-marketplace:ViewSubscriptions
              - events:*
              - scheduler:*
              - schemas:*
              - pipes:*
              - transcribe:*
              - translate:*
              - apigateway:*
              - execute-api:*
              - athena:*
              - glue:GetDatabase
              - glue:GetDatabases
              - glue:GetTable
              - glue:GetTables
              - glue:GetPartition
              - glue:GetPartitions
              - glue:BatchGetPartition
              - glue:CreateDatabase
              - glue:CreateTable
              - glue:UpdateTable
              - glue:DeleteTable
              - glue:CreatePartition
              - glue:BatchCreatePartition
              - glue:UpdatePartition
              - glue:DeletePartition
              - glue:BatchDeletePartition
              - apprunner:*
              - artifact:*
              - health:*
              - organizations:*
              - aws-portal:*
              - billing:*
              - account:*
              - ce:*
              - cur:*
              - budgets:*
              - consolidatedbilling:*
              - freetier:*
              - invoicing:*
              - payments:*
              - tax:*
              - bcm-data-exports:*
              - cost-optimization-hub:*
              - purchase-orders:*
              - acm:*
              - cloudformation:*
              - cloudfront:*
              - cloudfront-keyvaluestore:*
              - cloudshell:*
              - cloudtrail:*
              - cloudwatch:*
              - logs:*
              - codeartifact:*
              - codebuild:*
              - codecommit:*
              - codedeploy:*
              - codepipeline:*
              - cognito-idp:*
              - cognito-identity:*
              - cognito-sync:*
              - dynamodb:*
              - dax:*
              - ec2:*
              - ec2messages:*
              - imagebuilder:*
              - elasticfilesystem:*
              - elasticloadbalancing:*
              - autoscaling:*
              - application-autoscaling:*
              - ecr:*
              - ecr-public:*
              - ecs:*
              - guardduty:*
              - iam:*
              - sso:*
              - sso-directory:*
              - identitystore:*
              - sso-oauth:*
              - kms:*
              - kinesis:*
              - firehose:*
              - kinesisanalytics:*
              - kinesisvideo:*
              - lambda:*
              - mediaconvert:*
              - ram:*
              - rds:DescribeDBInstances
              - rds:DescribeDBClusters
              - rds:StopDBInstance
              - rds:StopDBCluster
              - route53:*
              - route53domains:*
              - route53resolver:*
              - s3:*
              - s3-object-lambda:*
              - servicequotas:*
              - sns:*
              - sqs:*
              - states:*
              - ssm:*
              - ssmmessages:*
              - trustedadvisor:*
              - support:*
              - supportplans:*
              - sts:*
              - tag:*
            Resource: "*"
          - Sid: DenyMarketplaceSubscribeOutsideBedrockMantle
            Effect: Deny
            Action: aws-marketplace:Subscribe
            Resource: "*"
            Condition:
              StringNotEqualsIfExists:
                aws:CalledViaLast: bedrock-mantle.amazonaws.com

  Ec2InstanceSizePolicy:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-ec2-instance-size
      Type: SERVICE_CONTROL_POLICY
      Description: Deny launching EC2 instances larger than nano, micro, or small.
      TargetIds: !If
        - AttachEc2InstanceSize
        - !Split [",", !Ref Ec2InstanceSizeTargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: cloud-mgmt
        - Key: component
          Value: scp-guardrails
        - Key: managed-by
          Value: cloudformation
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyEc2LargerThanSmall
            Effect: Deny
            Action: ec2:RunInstances
            Resource: arn:aws:ec2:*:*:instance/*
            Condition:
              StringNotLike:
                ec2:InstanceType:
                  - "*.nano"
                  - "*.micro"
                  - "*.small"

  BaselineSecurityPolicy:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-baseline-security
      Type: SERVICE_CONTROL_POLICY
      Description: Common IMDSv2, EBS encryption, S3 public-access, IAM credential, and organization protections.
      TargetIds: !If
        - AttachBaselineSecurity
        - !Split [",", !Ref BaselineSecurityTargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: cloud-mgmt
        - Key: component
          Value: scp-guardrails
        - Key: managed-by
          Value: cloudformation
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: RequireImdsv2OnLaunch
            Effect: Deny
            Action: ec2:RunInstances
            Resource: arn:aws:ec2:*:*:instance/*
            Condition:
              StringNotEquals:
                ec2:MetadataHttpTokens: required
          - Sid: DenyExplicitImdsv1OnExisting
            Effect: Deny
            Action: ec2:ModifyInstanceMetadataOptions
            Resource: arn:aws:ec2:*:*:instance/*
            Condition:
              StringEquals:
                ec2:MetadataHttpTokens: optional
          - Sid: DenyLeaveOrganization
            Effect: Deny
            Action: organizations:LeaveOrganization
            Resource: "*"
          - Sid: DenyDisableEbsEncryptionByDefault
            Effect: Deny
            Action: ec2:DisableEbsEncryptionByDefault
            Resource: "*"
          - Sid: RequireEncryptedEbsVolumes
            Effect: Deny
            Action:
              - ec2:CreateVolume
              - ec2:RunInstances
            Resource: arn:aws:ec2:*:*:volume/*
            Condition:
              Bool:
                ec2:Encrypted: "false"
          - Sid: ProtectS3AccountPublicAccessBlock
            Effect: Deny
            Action:
              - s3:PutAccountPublicAccessBlock
              - s3:DeleteAccountPublicAccessBlock
            Resource: "*"
          - Sid: DenyIamUsersAndAccessKeys
            Effect: Deny
            Action:
              - iam:CreateUser
              - iam:CreateAccessKey
              - iam:CreateLoginProfile
            Resource: "*"
          - Sid: ProtectQuarantineRemediationRole
            Effect: Deny
            Action:
              - iam:DeleteRole
              - iam:DeleteRolePolicy
              - iam:PutRolePolicy
              - iam:UpdateAssumeRolePolicy
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
            Resource: arn:aws:iam::*:role/home-cost-quarantine-remediation
            Condition:
              ArnNotLike:
                aws:PrincipalArn: arn:aws:iam::*:role/stacksets-exec-*

  CostControlPolicy:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-cost-control
      Type: SERVICE_CONTROL_POLICY
      Description: Block EC2 capacity commitments and Dedicated tenancy; domain registration remains allowed.
      TargetIds: !If
        - AttachCostControl
        - !Split [",", !Ref CostControlTargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: cloud-mgmt
        - Key: component
          Value: scp-guardrails
        - Key: managed-by
          Value: cloudformation
      Content:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyEc2CapacityCommitments
            Effect: Deny
            Action:
              - ec2:PurchaseReservedInstancesOffering
              - ec2:ModifyReservedInstances
              - ec2:PurchaseCapacityBlock
              - ec2:PurchaseHostReservation
              - ec2:CreateCapacityReservation
              - ec2:PurchaseScheduledInstances
              - ec2:AllocateHosts
            Resource: "*"
          - Sid: DenyDedicatedTenancy
            Effect: Deny
            Action: ec2:RunInstances
            Resource: arn:aws:ec2:*:*:instance/*
            Condition:
              StringNotEquals:
                ec2:Tenancy: default

Outputs:
  ProdRegionLockPolicyId:
    Description: Policy ID of the Prod region-lock SCP.
    Value: !Ref ProdRegionLockPolicy
  TestRegionLockPolicyId:
    Description: Policy ID of the Test region-lock SCP.
    Value: !Ref TestRegionLockPolicy
  ServiceAllowlistPolicyId:
    Description: Policy ID of the service-allowlist SCP.
    Value: !Ref ServiceAllowlistPolicy
  Ec2InstanceSizePolicyId:
    Description: Policy ID of the EC2 instance-size SCP.
    Value: !Ref Ec2InstanceSizePolicy
  BaselineSecurityPolicyId:
    Description: Policy ID of the baseline-security SCP.
    Value: !Ref BaselineSecurityPolicy
  CostControlPolicyId:
    Description: Policy ID of the cost-control SCP.
    Value: !Ref CostControlPolicy
