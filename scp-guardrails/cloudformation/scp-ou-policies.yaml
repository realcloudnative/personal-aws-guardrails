AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Opinionated OU-level cost guard: all environment-specific cost boundaries in
  one policy. These are choices specific to this home setup — someone forking
  this repository might disagree and customize or detach this policy. Deploy
  from the management account.

Parameters:
  PolicyNamePrefix:
    Type: String
    Default: paws
    AllowedPattern: "^[A-Za-z0-9_-]{1,40}$"
    Description: Provenance prefix for policy names (identifies project-managed SCPs).

  OpinionatedCostGuardTargetIds:
    Type: String
    Default: NONE
    AllowedPattern: "^(NONE|ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}(,ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})*)$"
    Description: Comma-separated OU IDs for the opinionated cost guard, or NONE to leave detached.

Conditions:
  AttachOpinionatedCostGuard: !Not [!Equals [!Ref OpinionatedCostGuardTargetIds, NONE]]

Resources:
  OpinionatedCostGuardPolicy:
    Type: AWS::Organizations::Policy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${PolicyNamePrefix}-opinionated-cost-guard
      Type: SERVICE_CONTROL_POLICY
      Description: >
        Opinionated cost boundaries for this home setup: instance sizes,
        expensive networking, compute services, storage, databases, and
        death-by-a-thousand-cuts resource creation. Fork-friendly: detach
        or customize if you disagree.
      TargetIds: !If
        - AttachOpinionatedCostGuard
        - !Split [",", !Ref OpinionatedCostGuardTargetIds]
        - !Ref AWS::NoValue
      Tags:
        - Key: project
          Value: personal-aws-guardrails
        - Key: component
          Value: scp-guardrails
        - Key: managed-by
          Value: cloudformation
      Content:
        Version: "2012-10-17"
        Statement:
          # --- Instance size ---
          - Sid: DenyEc2LargerThanSmall
            Effect: Deny
            Action: ec2:RunInstances
            Resource: arn:aws:ec2:*:*:instance/*
            Condition:
              StringNotLike:
                ec2:InstanceType:
                  - "*.nano"
                  - "*.micro"
                  - "*.small"
          # --- Expensive networking ---
          - Sid: DenyExpensiveNetworking
            Effect: Deny
            Action:
              - ec2:CreateNatGateway
              - ec2:CreateTransitGateway
              - ec2:CreateTransitGatewayVpcAttachment
              - ec2:CreateVpnGateway
              - ec2:CreateVpnConnection
              - ec2:CreateClientVpnEndpoint
              - ec2:AllocateAddress
            Resource: "*"
          # --- Expensive compute within allowed services ---
          - Sid: DenyExpensiveCompute
            Effect: Deny
            Action:
              - kms:CreateKey
              - bedrock:CreateProvisionedModelThroughput
              - bedrock:CreateModelCustomizationJob
              - lambda:PutProvisionedConcurrencyConfig
            Resource: "*"
          # --- Dashboards: tag bypass for intentional creation ---
          - Sid: DenyUntaggedDashboards
            Effect: Deny
            Action: cloudwatch:PutDashboard
            Resource: "*"
            Condition:
              StringNotEquals:
                aws:RequestTag/CreatedBy: manual
          # --- Expensive storage volumes ---
          - Sid: DenyProvisionedIopsVolumes
            Effect: Deny
            Action: ec2:CreateVolume
            Resource: arn:aws:ec2:*:*:volume/*
            Condition:
              StringEquals:
                ec2:VolumeType:
                  - io1
                  - io2
          - Sid: DenyProvisionedIopsOnLaunch
            Effect: Deny
            Action: ec2:RunInstances
            Resource: arn:aws:ec2:*:*:volume/*
            Condition:
              StringEquals:
                ec2:VolumeType:
                  - io1
                  - io2
          # --- Expensive features within allowed services ---
          - Sid: DenyExpensiveFeatures
            Effect: Deny
            Action:
              - s3:PutAccelerateConfiguration
              - cloudtrail:CreateTrail
            Resource: "*"

Outputs:
  OpinionatedCostGuardPolicyId:
    Description: Policy ID of the opinionated cost guard SCP.
    Value: !Ref OpinionatedCostGuardPolicy
